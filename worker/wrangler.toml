name = "secret-traitor-replicate"
main = "replicate-proxy.js"
compatibility_date = "2024-11-01"

# Stores no data. The player's Replicate token arrives per-request and is used only
# to forward that one call. An optional REPLICATE_API_TOKEN secret (set via the deploy
# workflow or `wrangler secret put REPLICATE_API_TOKEN`) is used as a fallback when a
# caller sends no token of their own.
