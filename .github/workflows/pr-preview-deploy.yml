name: PR preview deploy

# Deploys a full, self-contained preview of a pull request as FOUR fresh Cloudflare
# Workers — one for the backend (the Replicate proxy in worker/), one for the React SPA
# (built from frontend/), one for the legacy static site, and one for Storybook (built
# from frontend/). We deliberately do NOT use Cloudflare's built-in "preview"/versioned
# deployments (too limiting); instead each PR gets its own dedicated, uniquely-named
# Workers:
#
#   backend         -> secret-traitor-be-pr-<N>.<subdomain>.workers.dev
#   frontend (SPA)  -> secret-traitor-fe-pr-<N>.<subdomain>.workers.dev
#   frontend legacy -> secret-traitor-fe-legacy-pr-<N>.<subdomain>.workers.dev
#   storybook       -> secret-traitor-sb-pr-<N>.<subdomain>.workers.dev
#
# New commits on the same PR redeploy (overwrite) the same Workers. The matching
# pr-preview-cleanup.yml workflow deletes all of them when the PR is closed.
# On merge to main, Storybook is published to its own production Worker by
# deploy-storybook.yml (named secret-traitor-sb).
#
# Required GitHub repository secrets (same ones the prod deploy-worker.yml uses):
#   CLOUDFLARE_API_TOKEN   — token with the "Edit Cloudflare Workers" permission.
#   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account ID.
#   REPLICATE_API_TOKEN    — optional Replicate fallback token uploaded to the backend
#                            Worker as a secret (see worker/README.md).

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write   # to post the sticky preview-URL comment

# One deploy per PR at a time; a newer commit supersedes an in-progress run.
concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute Worker names
        id: names
        run: |
          echo "backend=secret-traitor-be-pr-${{ github.event.number }}" >> "$GITHUB_OUTPUT"
          echo "frontend=secret-traitor-fe-pr-${{ github.event.number }}" >> "$GITHUB_OUTPUT"
          echo "legacy=secret-traitor-fe-legacy-pr-${{ github.event.number }}" >> "$GITHUB_OUTPUT"
          echo "storybook=secret-traitor-sb-pr-${{ github.event.number }}" >> "$GITHUB_OUTPUT"

      # Install the workspace BEFORE the wrangler deploys below. The
      # cloudflare/wrangler-action steps run `npm i wrangler` in a directory without a
      # package.json (worker/, spa-preview/, …), so npm walks up and injects wrangler into
      # the root package.json — which would then make `pnpm install --frozen-lockfile`
      # fail against the root lockfile. Installing the workspace first keeps the root
      # package.json pristine for the frozen install.
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm --filter secret-traitor-frontend build-storybook

      # Rewrite the Worker name in worker/wrangler.toml so this PR deploys to its own
      # dedicated Worker (and so the REPLICATE_API_TOKEN secret lands on the right one).
      - name: Name the backend Worker for this PR
        run: |
          sed -i "s/^name = .*/name = \"${{ steps.names.outputs.backend }}\"/" worker/wrangler.toml

      - name: Deploy backend Worker
        id: backend
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          # Uploaded as a Worker secret so the proxy can fall back to it when a caller
          # sends no X-Replicate-Token (mirrors the production deploy-worker.yml).
          secrets: |
            REPLICATE_API_TOKEN
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}

      # Build the SPA pointing its portrait proxy at THIS PR's backend, so the preview is
      # fully self-contained. Output lands in frontend/dist.
      - name: Build SPA
        run: pnpm --filter secret-traitor-frontend build
        env:
          VITE_PORTRAIT_PROXY_URL: ${{ steps.backend.outputs.deployment-url }}

      - name: Stage SPA
        run: |
          mkdir -p spa-preview
          cat > spa-preview/wrangler.toml <<EOF
          name = "${{ steps.names.outputs.frontend }}"
          compatibility_date = "2024-11-01"

          [assets]
          directory = "../frontend/dist"
          EOF

      - name: Deploy SPA Worker
        id: frontend
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: spa-preview

      # Stage the legacy static site into an assets-only Worker, pointing
      # PORTRAIT_PROXY_URL at THIS PR's backend so it too is self-contained.
      - name: Stage legacy static game
        run: |
          mkdir -p fe-legacy/public
          cp index.html app.css app.js engine.js game.js fe-legacy/public/
          sed -i "s#const PORTRAIT_PROXY_URL = '[^']*'#const PORTRAIT_PROXY_URL = '${{ steps.backend.outputs.deployment-url }}'#" fe-legacy/public/game.js
          cat > fe-legacy/wrangler.toml <<EOF
          name = "${{ steps.names.outputs.legacy }}"
          compatibility_date = "2024-11-01"

          [assets]
          directory = "./public"
          EOF

      - name: Deploy legacy static Worker
        id: legacy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: fe-legacy

      # Serve the Storybook built earlier (frontend/storybook-static) as an assets-only
      # Worker.
      - name: Stage Storybook
        run: |
          mkdir -p sb-preview
          cat > sb-preview/wrangler.toml <<EOF
          name = "${{ steps.names.outputs.storybook }}"
          compatibility_date = "2024-11-01"

          [assets]
          directory = "../frontend/storybook-static"
          EOF

      - name: Deploy Storybook Worker
        id: storybook
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: sb-preview

      - name: Comment preview URLs
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-preview-urls -->';
            const fe = '${{ steps.frontend.outputs.deployment-url }}';
            const legacy = '${{ steps.legacy.outputs.deployment-url }}';
            const be = '${{ steps.backend.outputs.deployment-url }}';
            const sb = '${{ steps.storybook.outputs.deployment-url }}';
            const body = [
              marker,
              '### 🔭 PR preview deployed',
              '',
              `| | URL |`,
              `| --- | --- |`,
              `| 🎮 Frontend (SPA) | ${fe} |`,
              `| 🕹️ Frontend (legacy static) | ${legacy} |`,
              `| 🛰️ Backend (Replicate proxy) | ${be} |`,
              `| 📚 Storybook | ${sb} |`,
              '',
              `Updated for commit ${context.sha.slice(0, 7)}. These Workers are deleted automatically when the PR is closed.`,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
