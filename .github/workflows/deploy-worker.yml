name: Deploy Replicate proxy Worker

# Deploys the optional Cloudflare Worker in worker/ that proxies period-portrait
# requests to Replicate (see worker/README.md). The Cloudflare credentials below
# are used to publish it; REPLICATE_API_TOKEN is uploaded as a Worker secret so the
# Worker can fall back to it when a caller doesn't bring their own token.
#
# Required GitHub repository secrets:
#   CLOUDFLARE_API_TOKEN   — a Cloudflare API token with the "Edit Cloudflare Workers" permission.
#   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account ID.
#   REPLICATE_API_TOKEN    — a Replicate API token used as the Worker's fallback (optional;
#                            if unset, the Worker only works for callers who bring their own).

on:
  push:
    branches:
      - main
      - claude/secret-traitor-plan-bonbe
    # Only redeploy when the Worker itself changes.
    paths:
      - 'worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

# One deploy at a time; newer pushes supersede in-progress ones.
concurrency:
  group: deploy-worker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          # Uploaded to the Worker as a secret binding (wrangler secret put) so the
          # proxy can fall back to it when a caller sends no X-Replicate-Token.
          secrets: |
            REPLICATE_API_TOKEN
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
