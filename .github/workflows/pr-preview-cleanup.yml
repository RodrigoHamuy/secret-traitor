name: PR preview cleanup

# Tears down the per-PR preview Workers created by pr-preview-deploy.yml when the PR
# is closed (merged or not). Uses pull_request_target so the workflow runs with repo
# secrets even when the PR came from a fork — the deploy side never gets that for
# forks, but cleanup must always be able to remove what was deployed.
#
# This checks out NO PR code and runs NO PR-authored scripts: it only calls the
# Cloudflare API to delete the Workers by their deterministic names. That keeps the
# privileged pull_request_target context safe from untrusted PR contributions.
#
# Required GitHub repository secrets:
#   CLOUDFLARE_API_TOKEN   — token with the "Edit Cloudflare Workers" permission.
#   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account ID.

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: read
  pull-requests: write   # to update the sticky preview comment

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete preview Workers
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PR: ${{ github.event.number }}
        run: |
          set -euo pipefail
          for name in "secret-traitor-be-pr-$PR" "secret-traitor-fe-pr-$PR" "secret-traitor-sb-pr-$PR"; do
            echo "Deleting Worker: $name"
            # ?force=true also removes it if referenced by other Workers / Durable Objects.
            code=$(curl -sS -o /tmp/resp.json -w '%{http_code}' -X DELETE \
              "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/workers/scripts/$name?force=true" \
              -H "Authorization: Bearer $CF_API_TOKEN")
            echo "  HTTP $code: $(cat /tmp/resp.json)"
            # 200 = deleted, 404 = already gone / never deployed. Anything else is a real error.
            if [ "$code" != "200" ] && [ "$code" != "404" ]; then
              echo "::error::Failed to delete $name (HTTP $code)"
              exit 1
            fi
          done

      - name: Update preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-preview-urls -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              const body = `${marker}\n### 🔭 PR preview removed\n\nThe frontend, backend and Storybook preview Workers for this PR have been deleted.`;
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            }
